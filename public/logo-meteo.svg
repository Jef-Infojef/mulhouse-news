<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Mulhouse Météo Logo</title>
  <!-- Cercle Extérieur Rouge -->
  <circle cx="50" cy="50" r="32" stroke="#a91101" stroke-width="6" stroke-dasharray="2 1" />
  
  <!-- Thermomètre en Or Mat -->
  <rect x="46" y="15" width="8" height="55" rx="4" stroke="#ca8a04" stroke-width="1" />
  <rect x="48" y="20" width="4" height="50" fill="#ca8a04" />
  <circle cx="50" cy="72" r="8" fill="#ca8a04" />
  
  <!-- Graduations dorées -->
  <g stroke="#ca8a04" stroke-width="0.8">
    <line x1="40" y1="20" x2="44" y2="20" />
    <line x1="40" y1="25" x2="44" y2="25" />
    <line x1="40" y1="30" x2="44" y2="30" />
    <line x1="40" y1="35" x2="44" y2="35" />
    <line x1="40" y1="40" x2="44" y2="40" />
    <line x1="40" y1="45" x2="44" y2="45" />
    <line x1="40" y1="50" x2="44" y2="50" />
    <line x1="40" y1="55" x2="44" y2="55" />
    <line x1="40" y1="60" x2="44" y2="60" />
  </g>

  <!-- Roue de Mulhouse (8 pales) -->
  <g>
    <g transform="rotate(0 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(45 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(90 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(135 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(180 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(225 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(270 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
    <g transform="rotate(315 50 50)"><rect x="47" y="10" width="6" height="40" fill="#a91101" opacity="0.3"/><path d="M 42,5 L 58,5 L 56,15 L 44,15 Z" fill="#a91101"/></g>
  </g>
</svg>