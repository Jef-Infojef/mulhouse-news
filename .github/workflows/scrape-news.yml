name: Scrape Mulhouse News

on:
  schedule:
    - cron: '*/5 * * * *' # Exécution toutes les 5 minutes
  workflow_dispatch: # Permet le déclenchement manuel

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests googlenewsdecoder psycopg2-binary python-dotenv curl_cffi beautifulsoup4

      - name: Run Scraper Script (Discovery)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/scrape_and_seed.py

      - name: Run Content Scraper (Enrichment)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALSACE_COOKIES: ${{ secrets.ALSACE_COOKIES }}
        run: |
          python scripts/scrape_content.py
