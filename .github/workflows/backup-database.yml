name: Sauvegarde Complète (Full) - Hebdomadaire

on:
  schedule:
    # Chaque dimanche à 2h UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer le nom du fichier de sauvegarde
        id: backup-file
        run: |
          BACKUP_DATE=$(date +%Y-%m-%d_%H-%M-%S)
          BACKUP_FILE="backup-supabase-${BACKUP_DATE}.sql.gz"
          echo "filename=${BACKUP_FILE}" >> $GITHUB_OUTPUT
          echo "date=${BACKUP_DATE}" >> $GITHUB_OUTPUT

      - name: Installer PostgreSQL 17 Client
        run: |
          # Ajouter le dépôt PostgreSQL officiel
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

          # Installer PostgreSQL 17 client
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          # Vérifier la version
          psql --version
          pg_dump --version

      - name: Sauvegarder la base PostgreSQL Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          echo "📦 Création du dump PostgreSQL..."
          
          # Vérification de l'URL
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ Erreur: DATABASE_URL est vide!"
            exit 1
          fi

          # Ajout de sslmode=require si manquant
          DB_URL="${DATABASE_URL}"
          if [[ "$DB_URL" != *"?sslmode="* ]] && [[ "$DB_URL" != *"&sslmode="* ]]; then
             if [[ "$DB_URL" == *"?"* ]]; then
                DB_URL="${DB_URL}&sslmode=require"
             else
                DB_URL="${DB_URL}?sslmode=require"
             fi
          fi

          # Forcer l'utilisation de pg_dump 17
          PG_DUMP_17="/usr/lib/postgresql/17/bin/pg_dump"
          echo "⏳ Exécution de $($PG_DUMP_17 --version)..."
          
          $PG_DUMP_17 "$DB_URL" --no-owner --no-privileges --clean --if-exists --file=backup.sql

          # Vérification de la taille du fichier SQL
          FILE_SIZE=$(stat -c%s backup.sql 2>/dev/null || echo 0)
          echo "📏 Taille du fichier SQL brut : $FILE_SIZE octets"
          
          if [ "$FILE_SIZE" -lt 100 ]; then
             echo "❌ Erreur: Le fichier SQL est trop petit ou vide. Échec probable de pg_dump."
             cat backup.sql
             exit 1
          fi

          # Compression
          echo "🗜️ Compression..."
          gzip -c backup.sql > ${{ steps.backup-file.outputs.filename }}
          
          echo "✅ Sauvegarde compressée créée"
          ls -lh ${{ steps.backup-file.outputs.filename }}
          
          # Nettoyage fichier temporaire
          rm backup.sql

      - name: Configurer les credentials B2
        run: |
          aws configure set aws_access_key_id ${{ secrets.B2_APPLICATION_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.B2_APPLICATION_KEY }}
          aws configure set default.region us-west-002

      - name: Uploader vers B2 Cloud Storage (full/)
        env:
          B2_ENDPOINT: s3.eu-central-003.backblazeb2.com
          B2_BACKUP_BUCKET: mulhouse-news-backups-private
        run: |
          aws s3 cp ${{ steps.backup-file.outputs.filename }} \
            s3://$B2_BACKUP_BUCKET/database-backups/full/${{ steps.backup-file.outputs.filename }} \
            --endpoint-url=https://$B2_ENDPOINT

      - name: Nettoyer les anciens backups full (garder 8 semaines)
        env:
          B2_ENDPOINT: s3.eu-central-003.backblazeb2.com
          B2_BACKUP_BUCKET: mulhouse-news-backups-private
        run: |
          aws s3 ls s3://$B2_BACKUP_BUCKET/database-backups/full/ \
            --endpoint-url=https://$B2_ENDPOINT > backup-list.txt || true

          CUTOFF_DATE=$(date -d '56 days ago' +%Y-%m-%d)

          while IFS= read -r line; do
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            FILE_DATE=$(echo "$FILE_NAME" | grep -oP 'backup-supabase-\K[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)

            if [ ! -z "$FILE_DATE" ] && [ "$FILE_DATE" \< "$CUTOFF_DATE" ]; then
              echo "Suppression : $FILE_NAME"
              aws s3 rm s3://$B2_BACKUP_BUCKET/database-backups/full/$FILE_NAME \
                --endpoint-url=https://$B2_ENDPOINT || true
            fi
          done < backup-list.txt
