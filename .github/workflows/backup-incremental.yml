name: Sauvegarde Incrémentale - Quotidienne

on:
  schedule:
    # Chaque jour lundi-samedi à 2h UTC (dimanche = backup full)
    - cron: '0 2 * * 1-6'
  workflow_dispatch:

jobs:
  backup-incremental:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer le nom du fichier
        id: backup-file
        run: |
          BACKUP_DATE=$(date +%Y-%m-%d)
          BACKUP_FILE="incremental-${BACKUP_DATE}.json.gz"
          echo "filename=${BACKUP_FILE}" >> $GITHUB_OUTPUT
          echo "date=${BACKUP_DATE}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install psycopg2-binary

      - name: Exporter les nouvelles données (dernières 24h)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import os, json, gzip, psycopg2
          from datetime import datetime

          DATABASE_URL = os.environ["DATABASE_URL"].replace("?pgbouncer=true", "").replace("&pgbouncer=true", "")
          conn = psycopg2.connect(DATABASE_URL)
          cur = conn.cursor()

          # Articles créés ou modifiés dans les dernières 24h
          cur.execute("""
            SELECT id, title, link, "imageUrl", source, description,
                   "publishedAt", "createdAt", "updatedAt", content, "r2Url", hidden
            FROM "Article"
            WHERE "createdAt" > NOW() - INTERVAL '25 hours'
               OR "updatedAt" > NOW() - INTERVAL '25 hours'
            ORDER BY "createdAt" ASC
          """)
          cols = [d[0] for d in cur.description]
          rows = cur.fetchall()

          data = []
          for row in rows:
            obj = {}
            for col, val in zip(cols, row):
              obj[col] = val.isoformat() if hasattr(val, 'isoformat') else val
            data.append(obj)

          conn.close()

          output = {
            "backup_date": datetime.utcnow().isoformat(),
            "type": "incremental",
            "count": len(data),
            "articles": data
          }

          with gzip.open("${{ steps.backup-file.outputs.filename }}", "wt", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(data)} articles exportés → ${{ steps.backup-file.outputs.filename }}")
          EOF

      - name: Vérifier la taille
        run: |
          FILE_SIZE=$(stat -c%s "${{ steps.backup-file.outputs.filename }}" 2>/dev/null || echo 0)
          echo "Taille : $FILE_SIZE octets"
          ls -lh "${{ steps.backup-file.outputs.filename }}"

      - name: Configurer les credentials B2
        run: |
          aws configure set aws_access_key_id ${{ secrets.B2_APPLICATION_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.B2_APPLICATION_KEY }}
          aws configure set default.region us-west-002

      - name: Uploader vers B2 Cloud Storage (incremental/)
        env:
          B2_ENDPOINT: s3.eu-central-003.backblazeb2.com
          B2_BACKUP_BUCKET: mulhouse-news-backups-private
        run: |
          aws s3 cp "${{ steps.backup-file.outputs.filename }}" \
            s3://$B2_BACKUP_BUCKET/database-backups/incremental/${{ steps.backup-file.outputs.filename }} \
            --endpoint-url=https://$B2_ENDPOINT

      - name: Nettoyer les anciens incrémentaux (garder 30 jours)
        env:
          B2_ENDPOINT: s3.eu-central-003.backblazeb2.com
          B2_BACKUP_BUCKET: mulhouse-news-backups-private
        run: |
          aws s3 ls s3://$B2_BACKUP_BUCKET/database-backups/incremental/ \
            --endpoint-url=https://$B2_ENDPOINT > inc-list.txt || true

          CUTOFF_DATE=$(date -d '30 days ago' +%Y-%m-%d)

          while IFS= read -r line; do
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            FILE_DATE=$(echo "$FILE_NAME" | grep -oP 'incremental-\K[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)

            if [ ! -z "$FILE_DATE" ] && [ "$FILE_DATE" \< "$CUTOFF_DATE" ]; then
              echo "Suppression : $FILE_NAME"
              aws s3 rm s3://$B2_BACKUP_BUCKET/database-backups/incremental/$FILE_NAME \
                --endpoint-url=https://$B2_ENDPOINT || true
            fi
          done < inc-list.txt
